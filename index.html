<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tela login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div>
        <button class="claro-escuro" id="modo-claro" onclick="claro()">🔆</button>
        <button class="claro-escuro" id="modo-escuro" onclick="escuro()">🌙</button>
    </div>

    <main>

        <form id="form1"></form>

        <form id="form2">

            <div id="entrada">

                <div class="titulo">
                    <h1 id="titulo">Login</h1>
                </div>

                <div class="caixa-texto">
                    <input type="email" placeholder="Email" required>
                    <input type="password" placeholder="Senha" required>
                </div>

                <div class="botoes">
                    <input type="submit" value="Entrar" id="botao">
                </div>

                <div class="texto-final">
                    <a class="link" href="#" id="txt1">Esqueceu a senha?</a>
                    <a class="link" href="#" id="txt2" onclick="mudar()">Não tenho cadastro</a>
                </div>

            </div>

            <div id="cadastro">

                <div class="titulo">
                    <h1 id="tituloCadastro">Cadastro</h1>
                </div>

                <div class="caixa-texto">
                    <input type="text" placeholder="Nome" required>
                    <input type="email" placeholder="Email" required>
                    <input type="password" placeholder="Senha" required>
                </div>

                <div class="botoes">
                    <input type="submit" value="Cadastrar" id="botaoCadastro">
                </div>
                
            </div>

        </form>

    </main>

    <script src="script.js"></script>

</body>

</html>
